<!DOCTYPE html>
<html>
    <head>
        <title>Pong</title>
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <canvas id="canvas" width="700" height="400"></canvas>
        <p id="pause-msg">The Game is Paused. Press "P" to resume.</p>
        <p>Controls:</p>
        <ul>
            <li><b>W: </b>Move your bar up</li>
            <li><b>S: </b>Move your bar down</li>
            <li><b>P: </b>Pause the game if it is in play, or resume if it is paused</li>
            <li><b>R: </b>Restart a game after it has been completed</li>
        </ul>
        <!-- to import other files, we must specify our main file
         is a module... y tho? -->
        <script src="./game.js" type="module"></script>
    </body>
</html>
